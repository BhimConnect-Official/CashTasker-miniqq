<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CashTasker - Earn</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='11191563' data-sdk='show_11191563'></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        /* PREMIUM CSS */
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --bg-sec: var(--tg-theme-secondary-bg-color, #f4f5f7);
            --text-color: var(--tg-theme-text-color, #1c1c1e);
            --text-hint: var(--tg-theme-hint-color, #8e8e93);
            --primary: var(--tg-theme-button-color, #007aff);
            --primary-txt: var(--tg-theme-button-text-color, #ffffff);
            --success: #34c759;
            --danger: #ff3b30;
            --card-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, Helvetica, sans-serif; }
        
        body { background-color: var(--bg-sec); color: var(--text-color); padding-bottom: 90px; max-width: 480px; margin: 0 auto; min-height: 100vh; overflow-x: hidden; }

        /* App Bar */
        .app-bar { background: linear-gradient(135deg, var(--primary), #0056b3); padding: 25px 20px 40px 20px; color: #fff; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; box-shadow: 0 4px 12px rgba(0,122,255,0.3); }
        .user-row { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 48px; height: 48px; border-radius: 16px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; border: 1px solid rgba(255,255,255,0.3); text-transform: uppercase; }
        .user-info h3 { margin: 0; font-size: 18px; font-weight: 600; }
        .user-info p { margin: 0; font-size: 13px; opacity: 0.8; }

        /* Main Content Container */
        .container { padding: 0 20px; margin-top: -20px; }
        .tab-content { display: none; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .tab-content.active { display: block; }

        /* Premium Cards */
        .card { background: var(--bg-color); border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: var(--card-shadow); border: 1px solid rgba(0,0,0,0.03); }
        
        /* Balance Display */
        .balance-card { text-align: center; }
        .balance-amount { font-size: 42px; font-weight: 800; color: var(--text-color); margin: 10px 0; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .balance-amount i { color: #f5a623; font-size: 36px; }
        .inr-value { background: rgba(52, 199, 89, 0.1); color: var(--success); padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: 600; display: inline-block; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-item { background: var(--bg-color); padding: 16px; border-radius: 16px; display: flex; align-items: center; gap: 12px; box-shadow: var(--card-shadow); }
        .stat-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .stat-icon.blue { background: rgba(0, 122, 255, 0.1); color: var(--primary); }
        .stat-icon.green { background: rgba(52, 199, 89, 0.1); color: var(--success); }
        .stat-info h4 { font-size: 18px; margin: 0; }
        .stat-info p { font-size: 12px; color: var(--text-hint); margin: 0; }

        /* Inputs & Buttons */
        input { width: 100%; padding: 16px; border: 1.5px solid rgba(0,0,0,0.1); border-radius: 14px; font-size: 16px; background: var(--bg-sec); color: var(--text-color); margin-bottom: 15px; transition: 0.3s; outline: none; }
        input:focus { border-color: var(--primary); background: var(--bg-color); }
        
        button { background: var(--primary); color: var(--primary-txt); border: none; padding: 16px; border-radius: 14px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,122,255,0.3); }
        button:active { transform: scale(0.97); }
        button:disabled { background: var(--text-hint); box-shadow: none; cursor: not-allowed; }
        .btn-success { background: var(--success); box-shadow: 0 4px 15px rgba(52,199,89,0.3); }

        /* Floating Bottom Nav */
        .bottom-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--bg-color); display: flex; justify-content: space-around; padding: 12px 10px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100; border: 1px solid rgba(0,0,0,0.05); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-hint); font-size: 11px; font-weight: 500; cursor: pointer; gap: 6px; padding: 8px 12px; border-radius: 16px; transition: 0.3s; }
        .nav-item i { font-size: 20px; transition: 0.3s; }
        .nav-item.active { color: var(--primary); background: rgba(0, 122, 255, 0.08); }
        .nav-item.active i { transform: translateY(-2px); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-bar">
        <div class="user-row">
            <div class="avatar" id="user-avatar">U</div>
            <div class="user-info">
                <h3 id="user-name">Loading...</h3>
                <p id="user-id">UID: -----</p>
            </div>
        </div>
    </div>

    <div class="container">
        
        <div id="tab-home" class="tab-content active">
            <div class="card balance-card">
                <p style="color: var(--text-hint); font-weight: 500;">Available Balance</p>
                <div class="balance-amount"><i class="fas fa-coins"></i> <span id="ui-balance">0</span></div>
                <div class="inr-value">≈ ₹<span id="ui-inr">0.00</span> INR</div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-icon blue"><i class="fas fa-play"></i></div>
                    <div class="stat-info"><h4 id="stat-ads">0</h4><p>Ads Watched</p></div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon green"><i class="fas fa-users"></i></div>
                    <div class="stat-info"><h4 id="stat-refs">0</h4><p>Referrals</p></div>
                </div>
            </div>
        </div>

        <div id="tab-ads" class="tab-content">
            <div class="card" style="text-align: center; padding: 40px 20px;">
                <div style="width: 80px; height: 80px; background: rgba(0,122,255,0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px auto;">
                    <i class="fas fa-tv" style="font-size: 32px; color: var(--primary);"></i>
                </div>
                <h2 style="margin-bottom: 10px;">Watch & Earn</h2>
                <p style="color: var(--text-hint); font-size: 14px; margin-bottom: 25px;">Watch short video ads and earn coins instantly. Daily limit applies.</p>
                <button id="btn-watch-ad" onclick="watchMonetagAd()"><i class="fas fa-play-circle"></i> Watch Ad Now</button>
            </div>
        </div>

        <div id="tab-tasks" class="tab-content">
            <div class="card">
                <h2 style="margin-bottom:15px;">Daily Tasks</h2>
                <p style="color:gray; text-align:center;">Loading tasks...</p>
            </div>
        </div>

        <div id="tab-withdraw" class="tab-content">
            <div class="card">
                <h2 style="margin-bottom: 5px;">Withdraw to UPI</h2>
                <p id="withdraw-hint" style="font-size: 13px; color: var(--text-hint); margin-bottom: 20px;">Minimum withdraw: Loading...</p>
                
                <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block;">UPI ID</label>
                <input type="text" id="upi-input" placeholder="e.g., name@bank">
                
                <label style="font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block;">Amount (in Coins)</label>
                <input type="number" id="amount-input" placeholder="Enter coins">
                
                <button class="btn-success" onclick="requestWithdraw()"><i class="fas fa-paper-plane"></i> Request Payout</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="switchTab('ads')"><i class="fas fa-video"></i><span>Ads</span></div>
        <div class="nav-item" onclick="switchTab('tasks')"><i class="fas fa-tasks"></i><span>Tasks</span></div>
        <div class="nav-item" onclick="switchTab('withdraw')"><i class="fas fa-wallet"></i><span>Wallet</span></div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCC5nYJDubEOGFWZKlnajXmOWJs_3nd6bg",
            authDomain: "chatsphere-9563f.firebaseapp.com",
            databaseURL: "https://chatsphere-9563f-default-rtdb.firebaseio.com",
            projectId: "chatsphere-9563f",
            storageBucket: "chatsphere-9563f.firebasestorage.app",
            messagingSenderId: "800449405528",
            appId: "1:800449405528:web:3103f06aabb8ea583be02d"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // --- TELEGRAM INIT ---
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        let currentUser = {
            uid: tg.initDataUnsafe?.user?.id?.toString() || "demo_" + Math.floor(Math.random()*1000),
            name: tg.initDataUnsafe?.user?.first_name || "Guest",
            balance: 0, adsWatched: 0, referrals: 0
        };

        // Default Settings
        let settings = { coinRate: 10, adReward: 5, minWithdraw: 100, channelLink: "https://t.me/" };

        // INIT UI Header
        document.getElementById('user-name').innerText = currentUser.name;
        document.getElementById('user-avatar').innerText = currentUser.name.charAt(0);
        document.getElementById('user-id').innerText = "UID: " + currentUser.uid;

        // 1️⃣ REAL-TIME: FETCH ADMIN SETTINGS
        db.collection("settings").doc("appSettings").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                settings.adReward = data.adReward || 5;
                settings.coinRate = data.coinRate || 10;
                settings.minWithdraw = data.minWithdraw || 100;
                settings.channelLink = data.channelLink || "https://t.me/";

                // Update UI based on new settings
                document.getElementById('withdraw-hint').innerText = `Minimum withdraw: ₹${settings.minWithdraw} (${settings.minWithdraw * settings.coinRate} Coins)`;
                document.getElementById('btn-watch-ad').innerHTML = `<i class="fas fa-play-circle"></i> Watch Ad (+${settings.adReward} Coins)`;
                updateBalanceUI();
            }
        });

        // 2️⃣ REAL-TIME: FETCH TASKS FROM ADMIN
        db.collection("tasks").where("active", "==", true).onSnapshot(snapshot => {
            const taskContainer = document.getElementById('tab-tasks');
            let taskHtml = `<div class="card"><h2 style="margin-bottom:15px;">Daily Tasks</h2>`;
            
            if (snapshot.empty) {
                taskHtml += `<p style="color:var(--text-hint); text-align:center;">No tasks available right now.</p>`;
            } else {
                snapshot.forEach(doc => {
                    const task = doc.data();
                    taskHtml += `
                    <div class="stat-item" style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--bg-sec); border-radius: 12px; box-shadow: none; border: 1px solid rgba(0,0,0,0.05);">
                        <div style="text-align: left;">
                            <strong style="font-size: 16px;">${task.title}</strong><br>
                            <small style="color: var(--primary); font-weight:bold;">Reward: ${task.reward} Coins</small>
                        </div>
                        <button onclick="window.open('${task.link}', '_blank')" style="width: auto; padding: 8px 15px; font-size: 14px; border-radius: 8px;">View</button>
                    </div>`;
                });
            }
            taskHtml += `</div>`;
            taskContainer.innerHTML = taskHtml;
        });

        // 3️⃣ REAL-TIME: FETCH USER DATA
        db.collection("users").doc(currentUser.uid).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                // Agar Admin ne ban kiya hai to full screen block show karein
                if(data.isBanned) {
                    return document.body.innerHTML = `
                        <div style='height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column; background:var(--bg-sec); color:red;'>
                            <i class='fas fa-ban' style='font-size: 60px; margin-bottom: 20px;'></i>
                            <h2>Account Suspended</h2>
                            <p style='color: var(--text-hint);'>Contact support for more details.</p>
                        </div>`;
                }
                
                currentUser.balance = data.balance || 0;
                currentUser.adsWatched = data.adsWatched || 0;
                currentUser.referrals = data.referrals || 0;
                updateBalanceUI();
            } else {
                // First time registration setup
                db.collection("users").doc(currentUser.uid).set({
                    uid: currentUser.uid, name: currentUser.name, balance: 0, adsWatched: 0, referrals: 0, isBanned: false
                });
            }
        });

        // --- UPDATE UI BALANCE ---
        function updateBalanceUI() {
            document.getElementById('ui-balance').innerText = currentUser.balance;
            document.getElementById('ui-inr').innerText = (currentUser.balance / settings.coinRate).toFixed(2);
            document.getElementById('stat-ads').innerText = currentUser.adsWatched;
            document.getElementById('stat-refs').innerText = currentUser.referrals;
        }

        // --- TAB NAVIGATION LOGIC ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            tg.HapticFeedback.impactOccurred("light");
        }

        // --- WATCH AD WITH DYNAMIC REWARD ---
        function watchMonetagAd() {
            const btn = document.getElementById('btn-watch-ad');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';

            if (typeof show_11191563 === "function") {
                show_11191563().then(() => {
                    tg.HapticFeedback.notificationOccurred("success");
                    // Reward dynamic from admin setting
                    db.collection("users").doc(currentUser.uid).update({
                        balance: firebase.firestore.FieldValue.increment(settings.adReward),
                        adsWatched: firebase.firestore.FieldValue.increment(1)
                    });
                    tg.showAlert(`Awesome! ${settings.adReward} coins added.`);
                }).catch(err => {
                    tg.HapticFeedback.notificationOccurred("error");
                    tg.showAlert("Ad closed early or failed! No coins awarded.");
                }).finally(() => { 
                    btn.disabled = false; 
                    btn.innerHTML = `<i class="fas fa-play-circle"></i> Watch Ad (+${settings.adReward} Coins)`; 
                });
            } else {
                tg.showAlert("Ad SDK not ready. Please wait."); 
                btn.disabled = false; 
                btn.innerHTML = `<i class="fas fa-play-circle"></i> Watch Ad (+${settings.adReward} Coins)`;
            }
        }

        // --- WITHDRAW WITH DYNAMIC RULES ---
        function requestWithdraw() {
            const upi = document.getElementById('upi-input').value;
            const amount = parseInt(document.getElementById('amount-input').value);
            const minCoinsReq = settings.minWithdraw * settings.coinRate;

            if(!upi || !upi.includes('@')) {
                tg.HapticFeedback.notificationOccurred("warning");
                return tg.showAlert("Please enter a valid UPI ID.");
            }
            if(amount < minCoinsReq || isNaN(amount)) {
                tg.HapticFeedback.notificationOccurred("warning");
                return tg.showAlert(`Minimum ${minCoinsReq} coins (₹${settings.minWithdraw}) required.`);
            }
            if(amount > currentUser.balance) {
                tg.HapticFeedback.notificationOccurred("error");
                return tg.showAlert("Insufficient balance.");
            }

            db.collection("withdrawRequests").add({
                userId: currentUser.uid, 
                userName: currentUser.name, 
                amount: amount, 
                upi: upi, 
                status: 'pending', 
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                db.collection("users").doc(currentUser.uid).update({ 
                    balance: firebase.firestore.FieldValue.increment(-amount) 
                });
                tg.HapticFeedback.notificationOccurred("success");
                tg.showAlert("Withdrawal request sent successfully!");
                document.getElementById('amount-input').value = "";
                document.getElementById('upi-input').value = "";
            });
        }
    </script>
</body>
</html>
